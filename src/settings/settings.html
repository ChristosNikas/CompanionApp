<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings</title>
  <link rel="stylesheet" href="settings.css"/>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>Settings <span>/ Categories</span></h1>
      <div class="subtitle">// define how your apps are grouped</div>
    </div>
    <button class="btn btn-primary" onclick="saveAll()">Save Changes</button>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-title">Categories</div>
      <div id="category-list"></div>
      <button class="btn btn-ghost add-btn" onclick="addCategory()">+ Add Category</button>
    </div>
    <div class="panel">
      <div class="panel-title">App Assignments</div>
      <div class="panel-subtitle">Select a category to manage its apps</div>
      <div id="app-assignments"><div class="empty">Select a category on the left</div></div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
